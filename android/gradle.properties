# JVM memory — sufficient for large projects without over-allocating
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Xlint:-options

# Gradle performance
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# AndroidX — required for all modern Flutter plugins
android.useAndroidX=true
android.enableJetifier=true

# Disable R8 full mode to prevent missing class errors on release builds
android.enableR8.fullMode=false

# Suppress Kotlin incremental warning
kotlin.incremental=true
kotlin.code.style=official

# Suppress version warnings
android.suppressUnsupportedCompileSdk=35